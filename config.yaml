# ═══════════════════════════════════════════════════════════════════════
# Hermes Agent 配置文件
# 仅保留自定义配置，运行时自动与内置默认值合并
# ═══════════════════════════════════════════════════════════════════════

# 主力模型商
custom_providers:
  - name: zenmux
    base_url: https://zenmux.ai/api/v1
    api_key: ${ZENMUX_API_KEY}
    request_timeout_seconds: 300
    models:
      google/gemini-3.1-flash-lite:       # $0.25  Multimodal
        context_length: 1050000
      minimax/minimax-m2.7:               # $0.30
        context_length: 204800
      deepseek/deepseek-v4-pro:           # $0.44
        context_length: 1000000
      bytedance/doubao-seed-2.0-pro:      # $0.45  Multimodal
        context_length: 256000
      z-ai/glm-5.1:                       # $0.88
        context_length: 200000
      moonshotai/kimi-k2.6:               # $0.95  Multimodal
        context_length: 262140
      google/gemini-3.5-flash:           # $1.5
        context_length: 1050000
      openai/gpt-5.3-codex:               # $1.75  Multimodal
        context_length: 400000
      google/gemini-3.1-pro-preview:      # $2.00  Multimodal
        context_length: 1050000
      anthropic/claude-sonnet-4.6:        # $3.00  Multimodal
        context_length: 1000000
      anthropic/claude-opus-4.7:          # $5.00  Multimodal
        context_length: 1000000
      openai/gpt-5.5:                     # $5.00  Multimodal
        context_length: 1050000
      openai/gpt-5.5-pro:                 # $30.0  Multimodal
        context_length: 400000
  - name: vertex
    base_url: http://localhost:8897/v1
    api_key: noop
    model: gemini-3.1-flash-lite
    models:
      gemini-3.1-flash-lite:
        context_length: 1048576
      gemini-3.5-flash:
        context_length: 1048576
      gemini-3.1-pro-preview:
        context_length: 2097152

# 备用模型商（主提供商不可用时按顺序故障转移）
fallback_providers:
  - provider: custom
    model: qwen3.5
    base_url: http://localhost:11434/v1
    api_key: ollama

# ── 模型层 ──────────────────────────────────────────────────────────

# 主力模型
model:
  provider: custom:zenmux
  default: deepseek/deepseek-v4-pro
  read_timeout: 300

# 辅助模型（均走 ZenMux）
auxiliary:
  vision:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  web_extract:
    provider: custom:zenmux
    model: minimax/minimax-m2.7
  compression:
    provider: custom:zenmux
    model: deepseek/deepseek-v4-pro
  session_search:
    provider: custom:zenmux
    model: minimax/minimax-m2.7
  skills_hub:
    provider: custom:zenmux
    model: minimax/minimax-m2.7
  approval:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  mcp:
    provider: custom:zenmux
    model: minimax/minimax-m2.7
  title_generation:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  triage_specifier:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  curator:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite



# ── 行为层 ──────────────────────────────────────────────────────────

# 智能体
agent:
  max_turns: 180  # 默认 90

# 终端
terminal:
  cwd: ~/.hermes/workspace
  timeout: 600  # 默认 180

# 网络搜索
web:
  backend: brave-free  # 默认空

# 审批与权限
approvals:
  mode: smart                    # 默认 manual，智能审批低风险命令
  cron_mode: approve             # 定时任务自动批准
  destructive_slash_confirm: false

# 定时任务
cron:
  wrap_response: false

# 会话管理
sessions:
  auto_prune: true

# ── 集成层 ──────────────────────────────────────────────────────────

# Mattermost
mattermost:
  require_mention: false
  gateway_restart_notification: false
  channel_prompts:
    5amtupypk7rd7gifc1ea64z77r: 以自媒体运营身份工作
    ou1s9d7x8t87xnymw99inkniow: 切换投资顾问模式
    t9qbg1apejywbj1kayohw5hiwc: 切换为加拿大事务模式
    enuhz6t5t7g1dr5bm6q5hh7aky: 以育儿专家身份回答

# MCP 服务器
mcp_servers:
  bb-browser:
    command: npx
    args:
      - -y
      - bb-browser
      - --mcp
  qmd:
    command: qmd
    args:
      - mcp

# 插件
plugins:
  enabled:
    - zenmux-image
    - zenmux-video
    - mattermost-enhancer

# ── 输出层 ──────────────────────────────────────────────────────────

# 显示与交互
display:
  language: zh
  streaming: true
  bell_on_complete: true
  show_cost: true
  background_process_notifications: all
  runtime_footer:
    enabled: true
    fields:
      - model
      - context_pct  
  platforms:
    mattermost:
      streaming: true
      # tool_progress: off

# 流式输出
streaming:
  enabled: true
  transport: edit
  edit_interval: 0.3
  buffer_threshold: 40
  fresh_final_after_seconds: 1200

# 隐私
privacy:
  redact_pii: true

# 媒体生成
image_gen:
  provider: zenmux
  zenmux:
    model: openai/gpt-image-2
video_gen:
  provider: zenmux-video
  model: google/veo-3.1-fast-generate-001

# ── 管理层 ──────────────────────────────────────────────────────────

# 技能管理
curator:
  backup:
    keep: 3

# 引导状态（已完成的 onboarding 提示）
onboarding:
  seen:
    openclaw_residue_cleanup: true
    tool_progress_prompt: true
    busy_input_prompt: true

# 更新与维护
updates:
  pre_update_backup: true

# 平台工具集
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
  mattermost:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
  telegram:
    - hermes-telegram
  whatsapp:
    - hermes-whatsapp
  slack:
    - hermes-slack
  signal:
    - hermes-signal
  homeassistant:
    - hermes-homeassistant
  qqbot:
    - hermes-qqbot
  yuanbao:
    - hermes-yuanbao
  teams:
    - hermes-teams
  google_chat:
    - hermes-google_chat


# ── 安全 ────────────────────────────────────────────────────────────
# 允许解析到私有/保留 IP 的域名通过（本地 Mac 开发环境，DNS 返回 198.18.0.0/15）
# 云元数据端点 (169.254.169.254) 仍被硬编码拦截，不受此开关影响
security:
  allow_private_urls: true

# ── 全局 ────────────────────────────────────────────────────────────
timezone: Asia/Shanghai