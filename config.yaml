# ═══════════════════════════════════════════════════════════════════════
# Hermes Agent 配置文件
# 仅保留自定义配置，运行时自动与内置默认值合并
# ═══════════════════════════════════════════════════════════════════════

# 主力模型商
custom_providers:
- name: zenmux
  base_url: https://zenmux.ai/api/v1
  api_key: ${ZENMUX_API_KEY}
  request_timeout_seconds: 300
  models:
    deepseek/deepseek-v4-pro:
      context_length: 1000000
      name: DeepSeek V4 Pro
    google/gemini-3.1-flash-lite:
      context_length: 1050000
      name: Gemini 3.1 Flash Lite
    minimax/minimax-m3:
      context_length: 512000
      name: MiniMax M3
    bytedance/doubao-seed-2.0-pro:
      context_length: 256000
      name: Doubao-Seed-2.0-pro
    moonshotai/kimi-k2.7-code:
      context_length: 262140
      name: Kimi K2.7 Code
    z-ai/glm-5.2:
      context_length: 1000000
      name: GLM 5.2
    google/gemini-3.5-flash:
      context_length: 1050000
      name: Gemini 3.5 Flash
    openai/gpt-5.3-codex:
      context_length: 400000
      name: GPT-5.3-Codex
    google/gemini-3.1-pro-preview:
      context_length: 1050000
      name: Gemini 3.1 Pro
    anthropic/claude-sonnet-4.6:
      context_length: 1000000
      name: Claude Sonnet 4.6
    anthropic/claude-opus-4.8:
      context_length: 1000000
      name: Claude Opus 4.8
    openai/gpt-5.5:
      context_length: 1050000
      name: GPT-5.5
    openai/gpt-5.5-pro:
      context_length: 400000
      name: GPT-5.5 Pro
  api_mode: chat_completions
  model: deepseek/deepseek-v4-pro
- name: vertex
  base_url: http://localhost:8897/v1
  api_key: noop
  model: gemini-3.1-flash-lite
  models:
    gemini-3.1-flash-lite:
      context_length: 1048576
      name: Gemini 3.1 Flash Lite
    gemini-3.5-flash:
      context_length: 1048576
      name: Gemini 3.5 Flash
    gemini-3.1-pro-preview:
      context_length: 2097152
      name: Gemini 3.1 Pro
fallback_providers:
  - provider: custom
    model: qwen3.5
    base_url: http://localhost:11434/v1
    api_key: ollama

# ── 模型层 ──────────────────────────────────────────────────────────

# 主力模型
model:
  default: deepseek/deepseek-v4-pro
  provider: zenmux
  read_timeout: 300
auxiliary:
  approval:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  compression:
    provider: custom:zenmux
    model: deepseek/deepseek-v4-pro
  curator:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  mcp:
    provider: custom:zenmux
    model: minimax/minimax-m3
  session_search:
    provider: custom:zenmux
    model: minimax/minimax-m3
  skills_hub:
    provider: custom:zenmux
    model: minimax/minimax-m3
  title_generation:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  triage_specifier:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite
  vision:
    provider: custom:zenmux
    model: google/gemini-3.1-flash-lite


# ── 行为层 ──────────────────────────────────────────────────────────

# 智能体
agent:
  max_turns: 180  # 默认 90

# 终端
terminal:
  cwd: ~/.hermes/workspace
  timeout: 600  # 默认 180

# 网络搜索
web:
  search_backend: brave-free  # 默认空

# 会话管理
sessions:
  auto_prune: true

# 审批与权限
approvals:
  mode: smart                    # 默认 manual，智能审批低风险命令
  cron_mode: approve             # 定时任务自动批准
  destructive_slash_confirm: false

# 定时任务
cron:
  wrap_response: false

# ── 集成层 ──────────────────────────────────────────────────────────

# Mattermost
mattermost:
  require_mention: false
  gateway_restart_notification: false
  channel_prompts:
    5amtupypk7rd7gifc1ea64z77r: 以自媒体运营身份工作
    ou1s9d7x8t87xnymw99inkniow: 切换投资顾问模式
    t9qbg1apejywbj1kayohw5hiwc: 切换为加拿大事务模式
    enuhz6t5t7g1dr5bm6q5hh7aky: 以育儿专家身份回答
    4hj3jb341fr8jpehxh7ejuh43y: 以中国通身份回答

# MCP 服务器
mcp_servers:
  qmd:
    enabled: true
    command: qmd
    args:
    - mcp
plugins:
  enabled:
    - zenmux-image
    - zenmux-video
    - mattermost-enhancer

# ── 输出层 ──────────────────────────────────────────────────────────

# 显示与交互
display:
  language: zh
  streaming: true
  bell_on_complete: true
  show_cost: true
  background_process_notifications: all
  busy_input_mode: steer
  runtime_footer:
    enabled: true
    fields:
      - model
      - context_pct
  platforms:
    mattermost:
      streaming: true

# 流式输出
streaming:
  enabled: true
  transport: edit
  edit_interval: 0.3
  buffer_threshold: 40
  fresh_final_after_seconds: 1200

# 隐私
privacy:
  redact_pii: true

# 媒体生成
image_gen:
  provider: zenmux
  zenmux:
    model: openai/gpt-image-2
video_gen:
  provider: zenmux-video
  model: google/veo-3.1-fast-generate-001

# ── 管理层 ──────────────────────────────────────────────────────────

# 平台工具集
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web_search
  mattermost:
    - clarify
    - cronjob
    - delegation
    - file
    - memory
    - messaging
    - session_search
    - skills
    - terminal
    - todo
    - vision
    - web_search

# 技能管理
curator:
  backup:
    keep: 3

# 引导状态（已完成的 onboarding 提示）
onboarding:
  seen:
    openclaw_residue_cleanup: true
    tool_progress_prompt: true
    busy_input_prompt: true

# 更新与维护
updates:
  pre_update_backup: true


# ── 安全 ────────────────────────────────────────────────────────────
# 允许解析到私有/保留 IP 的域名通过（本地 Mac 开发环境，DNS 返回 198.18.0.0/15）
# 云元数据端点 (169.254.169.254) 仍被硬编码拦截，不受此开关影响
security:
  allow_private_urls: true

# ── 全局 ────────────────────────────────────────────────────────────
timezone: Asia/Shanghai
